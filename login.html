<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Insecta Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#c5a059', secondary: '#064e3b', dark: '#0a0a0a', light: '#f5f5dc' } } }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-theme-main p-6 text-theme-main">
    <!-- Theme & RTL Toggles -->
    <div class="fixed top-8 right-8 flex items-center gap-4 z-50">
        <button id="theme-toggle" class="utility-btn bg-theme-main/50 backdrop-blur-md">
            <svg class="theme-icon fill-primary" viewBox="0 0 24 24"></svg>
        </button>
        <button id="rtl-toggle" class="utility-btn text-[10px] font-bold uppercase bg-theme-main/50 backdrop-blur-md">
            RTL
        </button>
    </div>

    <!-- Auth Card -->
    <div class="glass max-w-md w-full p-12 border-theme fade-in">
        <div class="text-center mb-12">
            <a href="index.html" class="flex items-center justify-center gap-3 group mb-8">
                <img src="assets/images/logo.png" alt="Insecta Logo" class="w-8 h-8 object-contain group-hover:scale-110 transition-transform">
                <span class="font-serif text-2xl tracking-widest uppercase text-theme-main">INSECTA</span>
            </a>
            <h1 class="text-3xl font-serif mb-2 text-theme-main">Welcome Back</h1>
            <p class="text-xs uppercase tracking-widest text-theme-muted">Enter your credentials to access the studio</p>
        </div>

        <form class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] uppercase tracking-[0.2em] text-theme-muted">Email Address</label>
                <input type="email" required class="w-full bg-transparent border border-theme px-4 py-3 outline-none focus:border-primary transition-colors text-theme-main">
            </div>
            <div class="space-y-2 relative">
                <label class="text-[10px] uppercase tracking-[0.2em] text-theme-muted">Password</label>
                <input type="password" id="password" required class="w-full bg-transparent border border-theme px-4 py-3 outline-none focus:border-primary transition-colors text-theme-main pr-12">
                <button type="button" class="password-toggle absolute right-4 top-8 text-primary opacity-40 hover:opacity-100 transition-opacity">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                </button>
            </div>
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="remember" class="accent-primary">
                    <label for="remember" class="text-[10px] uppercase tracking-widest text-theme-muted cursor-pointer">Remember Me</label>
                </div>
                <a href="#" class="text-[10px] uppercase tracking-widest text-primary hover:underline">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-premium w-full py-4 mt-4">Login to Studio</button>
        </form>

        <div class="relative my-10 text-center">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-primary/10"></div>
            </div>
            <span class="relative px-4 text-[10px] uppercase tracking-widest text-theme-muted bg-theme-main">Or continue with</span>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button type="button" class="flex items-center justify-center gap-3 border border-primary/20 py-3 hover:border-primary hover:bg-primary/5 transition-all group">
                <svg class="w-5 h-5 fill-primary group-hover:scale-110 transition-transform" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09zM12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23zM5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84zm6.16-7.09c1.62 0 3.07.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span class="text-[10px] uppercase tracking-widest font-bold">Google</span>
            </button>
            <button type="button" class="flex items-center justify-center gap-3 border border-primary/20 py-3 hover:border-primary hover:bg-primary/5 transition-all group">
                <svg class="w-5 h-5 fill-primary group-hover:scale-110 transition-transform" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                <span class="text-[10px] uppercase tracking-widest font-bold">Facebook</span>
            </button>
        </div>

        <div class="mt-12 text-center text-xs tracking-widest text-theme-muted">
            Don't have an account? <a href="signup.html" class="text-primary hover:underline ml-2">Register Now</a>
        </div>
    </div>


    <script src="js/main.js"></script>
</body>
</html>
